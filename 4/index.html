<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوگو پروژکتورهای لاکچری ۱۴۰۵</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --gold: #d4af37;
      --glass-bg: rgba(15, 15, 25, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Vazirmatn', sans-serif !important;
    }

    body {
      background-color: #030305;
      color: #f5f5f5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* تنظیمات لایه‌بندی برای دیده شدن ذرات */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* پشت محتوا */
      pointer-events: none;
      background: radial-gradient(circle at 50% 15%, #151020 0%, #030305 100%);
    }

    .content-wrapper {
      position: relative;
      z-index: 10; /* روی ذرات */
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(212, 175, 55, 0.25);
    }

    .title-gold {
      background: linear-gradient(90deg, #ffeaa7, #d4af37, #f0e0a8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
    }

    .product-card {
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .product-card:hover {
      transform: translateY(-15px);
      border-color: var(--gold);
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
    }

    /* افکت درخشش روی عکس محصول */
    .product-card::before {
      content: '';
      position: absolute;
      top: -100%;
      left: -100%;
      width: 50%;
      height: 200%;
      background: linear-gradient(to bottom right, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: rotate(45deg);
      transition: 0.8s;
    }
    .product-card:hover::before {
      top: 100%;
      left: 100%;
    }

    .price-value {
      font-weight: 800;
      color: #ffd700;
      font-size: 1.6rem;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }
  </style>
</head>
<body>

  <canvas id="particles-js"></canvas>

  <div class="content-wrapper">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/60 backdrop-blur-lg border-b border-white/10">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2 text-amber-400">
          <i class="fa-solid fa-phone-flip animate-bounce"></i>
          <a href="tel:09195703080" class="text-xl font-black">۰۹۱۹۵۷۰۳۰۸۰</a>
        </div>
        <a href="https://wa.me/989195703080" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-full text-white font-bold transition-all shadow-lg">
          <i class="fa-brands fa-whatsapp text-xl ml-1"></i> واتساپ
        </a>
      </div>
    </nav>

    <header class="pt-48 pb-24 text-center">
      <h1 class="title-gold text-5xl sm:text-7xl md:text-8xl font-black mb-6">
        لوگو پروژکتور
      </h1>
      <p class="text-zinc-400 text-xl font-light tracking-widest">LUXURY LIGHTING 2026</p>
      <div class="mt-12">
        <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" class="bg-white text-black font-black px-10 py-4 rounded-full hover:bg-amber-400 transition-colors">
          مشاهده کاتالوگ
        </button>
      </div>
    </header>

    <section id="products" class="max-w-7xl mx-auto px-5 py-12">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        
        <script>
          const items = [
            { n: "لوگو پروژکتور ۱۲۰۰ وات", p: "۱۴۴,۰۰۰,۰۰۰" },
            { n: "۳۰۰ وات اسلایدی", p: "۳۳,۹۰۰,۰۰۰" },
            { n: "۲۰۰ وات اسلایدی", p: "۲۹,۹۰۰,۰۰۰" },
            { n: "۳۰۰ وات چرخشی", p: "۲۹,۰۰۰,۰۰۰" },
            { n: "۲۰۰ وات چرخشی", p: "۲۴,۹۰۰,۰۰۰" },
            { n: "۱۰۰ وات اسلایدی", p: "۱۹,۷۰۰,۰۰۰" },
            { n: "۱۰۰ وات چرخشی", p: "۱۷,۵۰۰,۰۰۰" },
            { n: "۷۰ وات چرخشی", p: "۱۴,۹۰۰,۰۰۰" }
          ];

          document.write(items.map((item, i) => `
            <div class="product-card glass rounded-[2rem] overflow-hidden p-2">
              <div class="h-60 bg-black/40 rounded-[1.8rem] flex items-center justify-center p-6 mb-4">
                <img src="images/p${i+1}.png" alt="محصول" class="max-h-full object-contain">
              </div>
              <div class="p-4 text-center">
                <h3 class="text-white font-bold text-lg mb-3">${item.n}</h3>
                <div class="price-value">${item.p}</div>
                <div class="text-zinc-500 text-xs mt-1">تومان</div>
              </div>
            </div>
          `).join(''));
        </script>

      </div>
    </section>

    <footer class="py-20 text-center opacity-40">
      <p>© تمامی حقوق محفوظ است - ۱۴۰۵</p>
    </footer>
  </div>

  <script>
    const canvas = document.getElementById('particles-js');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.init();
      }
      init() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1; // بزرگتر شدن ذرات
        this.speedY = Math.random() * 0.8 + 0.2; // حرکت به سمت پایین (مثل ریزش نور)
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.8 + 0.2;
      }
      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.y > canvas.height) this.y = -10;
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
      }
      draw() {
        ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(212, 175, 55, 0.5)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; // ریست کردن سایه برای عملکرد بهتر
      }
    }

    function setup() {
      resize();
      for (let i = 0; i < 60; i++) particles.push(new Particle());
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    setup();
    loop();
  </script>

</body>
</html>
