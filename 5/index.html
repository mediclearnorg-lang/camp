<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه پروژکتور لوگو | تجهیزات تبلیغاتی لوکس</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & VARS (رنگ‌های اصلی خودت) --- */
        :root {
            --bg: #020202;
            --gold: #FFD700;
            --gold-dim: #b8860b;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Vazirmatn', sans-serif !important;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- ANIMATED BACKGROUND --- */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #1a0b2e 0%, #000000 80%);
            z-index: -2;
        }
        
        /* ذرات ریز و شیک */
        .particle {
            position: fixed; background: white; border-radius: 50%; opacity: 0; pointer-events: none;
            animation: rise linear infinite; z-index: -1;
        }
        @keyframes rise {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-5vh) scale(1); opacity: 0; }
        }

        .container { width: 90%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }
        .section-title { text-align: center; font-size: 2.2rem; margin-bottom: 40px; color: var(--gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }

        /* --- HERO SECTION --- */
        header {
            min-height: 85vh; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding-top: 80px;
        }

        .glitch-text {
            font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 900; line-height: 1.1;
            background: linear-gradient(to right, #fff, var(--gold), #fff); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; margin-bottom: 20px;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .product-stage {
            position: relative; width: 280px; height: 280px; margin: 40px auto;
            display: flex; justify-content: center; align-items: center;
        }
        .product-stage::before, .product-stage::after {
            content: ''; position: absolute; width: 110%; height: 110%; border-radius: 50%;
            mask-image: radial-gradient(transparent 65%, black 66%); -webkit-mask-image: radial-gradient(transparent 65%, black 66%);
            animation: rotateBorder 4s linear infinite;
        }
        .product-stage::before { background: conic-gradient(transparent, transparent, transparent, var(--gold)); }
        .product-stage::after { background: conic-gradient(transparent, transparent, transparent, var(--neon-blue)); animation-delay: -2s; }
        @keyframes rotateBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hero-img {
            width: 85%; height: auto; position: relative; z-index: 2;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- LIQUID GLASS CARDS --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 100px;
        }

        .liquid-card {
            background: linear-gradient(145deg, var(--glass-bg), rgba(255,255,255,0.005));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 20px; text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .liquid-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-25deg); transition: 0.7s;
        }
        .liquid-card:hover::before { left: 150%; }

        .liquid-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 15px 40px rgba(0, 243, 255, 0.15);
        }

        .prod-img-box { height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .prod-img { max-width: 90%; max-height: 100%; transition: 0.4s; }
        .liquid-card:hover .prod-img { transform: scale(1.08); }

        .prod-title { font-size: 1.1rem; margin-bottom: 10px; color: #fff; font-weight: bold; min-height: 3rem; display: flex; align-items: center; justify-content: center; }
        .prod-price { color: var(--gold); font-size: 1.6rem; font-weight: 900; margin-bottom: 15px; }
        .prod-price span { font-size: 0.85rem; color: #ccc; }

        .btn-whatsapp {
            display: block; width: 100%; padding: 12px;
            background: transparent; color: #25D366; border: 1px solid #25D366;
            border-radius: 15px; font-weight: bold; text-decoration: none; transition: 0.3s;
        }
        .btn-whatsapp:hover { background: #25D366; color: #000; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }

        /* --- FOOTER --- */
        .sticky-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10,10,10,0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--gold); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 999;
        }

        @media (max-width: 480px) {
            .glitch-text { font-size: 2.5rem; }
            .sticky-footer { padding: 10px; }
            .sticky-footer span { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <header>
        <div class="container">
            <h1 class="glitch-text">امضای نوری<br>برند شما</h1>
            <div class="product-stage">
                <img src="images/p1.png" alt="پروژکتور اصلی" class="hero-img">
            </div>
            <a href="#products" style="color: var(--gold); text-decoration: none; font-size: 1.2rem;">
                مشاهده محصولات <i class="fas fa-chevron-down animate-bounce"></i>
            </a>
        </div>
    </header>

    <section id="products" class="container">
        <h2 class="section-title">کاتالوگ محصولات</h2>
        <div class="products-grid">
            <script>
                const data = [
                    { id: 1, name: "لوگو پروژکتور 1200W قدرتمند", price: "144,000,000" },
                    { id: 2, name: "لوگو پروژکتور 300W اسلایدی", price: "33,900,000" },
                    { id: 3, name: "لوگو پروژکتور 200W اسلایدی", price: "29,900,000" },
                    { id: 4, name: "لوگو پروژکتور 300W چرخشی", price: "29,000,000" },
                    { id: 5, name: "لوگو پروژکتور 200W چرخشی", price: "24,900,000" },
                    { id: 6, name: "لوگو پروژکتور 100W اسلایدی", price: "19,700,000" },
                    { id: 7, name: "لوگو پروژکتور 100W چرخشی", price: "17,500,000" },
                    { id: 8, name: "لوگو پروژکتور 70W چرخشی", price: "14,900,000" }
                ];

                document.write(data.map(item => `
                    <div class="liquid-card">
                        <div class="prod-img-box">
                            <img src="images/p${item.id}.png" alt="${item.name}" class="prod-img">
                        </div>
                        <h3 class="prod-title">${item.name}</h3>
                        <div class="prod-price">${item.price} <span>تومان</span></div>
                        <a href="https://wa.me/989195703080" class="btn-whatsapp">
                            <i class="fab fa-whatsapp"></i> مشاوره در واتساپ
                        </a>
                    </div>
                `).join(''));
            </script>
        </div>
    </section>

    <div class="sticky-footer">
        <div style="line-height: 1.2;">
            <span style="color: var(--gold); font-size: 0.8rem;">کارشناس فروش:</span><br>
            <a href="tel:09195703080" style="color: #fff; text-decoration: none; font-weight: 900; font-size: 1.1rem;">۰۹۱۹۵۷۰۳۰۸۰</a>
        </div>
        <a href="tel:09195703080" style="background: var(--gold); color: #000; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 0 15px var(--gold);">
            <i class="fas fa-phone"></i> تماس مستقیم
        </a>
    </div>

    <script>
        function createParticles() {
            const count = 50; 
            const body = document.body;
            for (let i = 0; i < count; i++) {
                let p = document.createElement('div');
                p.classList.add('particle');
                let size = Math.random() * 3 + 0.5; // ذرات ریز
                p.style.width = size + 'px'; 
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 7 + 5) + 's'; 
                p.style.animationDelay = (Math.random() * 5) + 's';
                
                // ترکیب رنگ‌های کد خودت برای ذرات
                let colors = [var(--gold), var(--neon-purple), var(--neon-blue), '#ffffff'];
                // چون در JS نمی‌توان مستقیم از متغیر CSS در آرایه استفاده کرد، مقادیر معادل را می‌گذاریم:
                let hexColors = ['#FFD700', '#bc13fe', '#00f3ff', '#ffffff'];
                p.style.background = hexColors[Math.floor(Math.random() * hexColors.length)];
                p.style.boxShadow = `0 0 5px ${p.style.background}`;
                
                body.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
