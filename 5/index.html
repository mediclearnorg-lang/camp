<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویترین لوکس لوگو پروژکتور</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #040406;
            --gold: #FFD700;
            --copper: #b87333;
            --neon-blue: #00f3ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 243, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Vazirmatn', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* پس‌زمینه عمیق */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 10%, rgba(184, 115, 51, 0.1) 0%, transparent 60%), #040406;
            z-index: -2;
        }

        /* ذرات طلای درشت و درخشان */
        .gold-sparkle {
            position: fixed; background: linear-gradient(45deg, var(--gold), #fff);
            border-radius: 50%; pointer-events: none; opacity: 0;
            animation: floatUp linear infinite; z-index: -1;
            box-shadow: 0 0 10px var(--gold);
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            30% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container { width: 92%; max-width: 1200px; margin: 0 auto; }

        header {
            min-height: 50vh; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding: 60px 0;
        }

        /* تایتل با گرادینت متحرک کوپری-طلایی */
        .moving-title {
            font-size: clamp(2.8rem, 8vw, 5rem); font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--copper), var(--gold), #fff);
            background-size: 300% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shineText 6s linear infinite;
        }
        @keyframes shineText { to { background-position: 300% center; } }

        /* باکس محصولات شیشه‌ای با افکت برق زدن */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 30px; padding-bottom: 120px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px; padding: 30px; text-align: center;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* افکت برق زدن کارد در هاور */
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
            transform: skewX(-20deg); transition: 0.8s;
        }
        .glass-card:hover::before { left: 150%; }

        .glass-card:hover {
            transform: translateY(-15px);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 40px rgba(0, 243, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .prod-img { max-width: 85%; height: 180px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 20px #000); }
        .prod-title { font-size: 1.15rem; font-weight: bold; color: #fff; margin-bottom: 15px; }
        
        /* قیمت طلایی */
        .prod-price { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 20px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        /* دکمه آبی نئونی */
        .btn-neon {
            display: block; width: 100%; padding: 14px;
            background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue);
            border-radius: 18px; font-weight: 800; text-decoration: none; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.1);
        }
        .btn-neon:hover {
            background: var(--neon-blue); color: #000;
            box-shadow: 0 0 25px var(--neon-blue);
        }

        /* فوتر موبایل */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(15px);
            border-top: 1px solid #222; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        .btn-wa-footer {
            background: #25D366; color: white; padding: 12px 25px; border-radius: 50px;
            text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3);
        }

        .call-link { text-align: right; }
        .call-link a { color: white; text-decoration: none; font-weight: 900; font-size: 1.3rem; }

        @media (max-width: 500px) { .btn-wa-footer span { display: none; } }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="container">
        <h1 class="moving-title">لوگو پروژکتور</h1>
        <p style="color: var(--copper); letter-spacing: 4px; font-weight: bold; margin-top: 10px; font-size: 0.8rem;">LUXURY LIGHTING SOLUTIONS</p>
    </header>

    <section class="container">
        <div class="grid" id="productGrid">
            <script>
                const products = [
                    { id: 1, name: "لوگو پروژکتور 1200W قدرتمند", price: "144,000,000" },
                    { id: 2, name: "لوگو پروژکتور 300W اسلایدی", price: "33,900,000" },
                    { id: 3, name: "لوگو پروژکتور 200W اسلایدی", price: "29,900,000" },
                    { id: 4, name: "لوگو پروژکتور 300W چرخشی", price: "29,000,000" },
                    { id: 5, name: "لوگو پروژکتور 200W چرخشی", price: "24,900,000" },
                    { id: 6, name: "لوگو پروژکتور 100W اسلایدی", price: "19,700,000" },
                    { id: 7, name: "لوگو پروژکتور 100W چرخشی", price: "17,500,000" },
                    { id: 8, name: "لوگو پروژکتور 70W چرخشی", price: "14,900,000" }
                ];

                document.getElementById('productGrid').innerHTML = products.map(p => {
                    const msg = encodeURIComponent(`سلام، وقت بخیر. من در مورد مدل ${p.name} با قیمت ${p.price} تومان نیاز به مشاوره دارم.`);
                    return `
                    <div class="glass-card">
                        <img src="images/p${p.id}.png" class="prod-img" alt="${p.name}">
                        <h3 class="prod-title">${p.name}</h3>
                        <div class="prod-price">${p.price} <span style="font-size: 0.8rem; color: #888;">تومان</span></div>
                        <a href="https://wa.me/989195703080?text=${msg}" class="btn-neon">
                            مشاوره در واتساپ
                        </a>
                    </div>
                `}).join('');
            </script>
        </div>
    </section>

    <div class="footer">
        <a href="https://wa.me/989195703080?text=سلام، در مورد لوگو پروژکتور مشاوره می‌خواستم" class="btn-wa-footer">
            <i class="fab fa-whatsapp" style="font-size: 1.6rem;"></i>
            <span>مشاوره در واتساپ</span>
        </a>
        <div class="call-link">
            <span style="font-size: 0.7rem; color: #777;">تماس با کارشناس:</span><br>
            <a href="tel:09195703080">۰۹۱۹۵۷۰۳۰۸۰</a>
        </div>
    </div>

    <script>
        // ایجاد ذرات طلای درشت‌تر
        function makeGold() {
            const body = document.body;
            for (let i = 0; i < 40; i++) {
                let p = document.createElement('div');
                p.className = 'gold-sparkle';
                let size = Math.random() * 6 + 2; // درشت‌تر از قبل
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 7 + 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                body.appendChild(p);
            }
        }
        makeGold();
    </script>

</body>
</html>
