<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه پروژکتور لوگو | تجهیزات تبلیغاتی لوکس</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & VARS --- */
        :root {
            --bg: #020202;
            --gold: #FFD700;
            --gold-dim: #b8860b;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Vazirmatn', sans-serif !important;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- ANIMATED BACKGROUND & PARTICLES --- */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #1a0b2e 0%, #000000 80%);
            z-index: -2;
        }
        
        .particle {
            position: fixed; background: white; border-radius: 50%; opacity: 0; pointer-events: none;
            z-index: -1; animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* --- UTILITY --- */
        .container { width: 92%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 50px; color: var(--gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); font-weight: 900; }

        /* --- HERO SECTION --- */
        header {
            min-height: 80vh; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding-top: 80px;
        }

        .glitch-text {
            font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 900; line-height: 1.2;
            background: linear-gradient(to right, #fff, var(--gold), #fff); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; margin-bottom: 20px;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .product-stage {
            position: relative; width: 280px; height: 280px; margin: 40px auto;
            display: flex; justify-content: center; align-items: center;
        }
        .product-stage::before, .product-stage::after {
            content: ''; position: absolute; width: 110%; height: 110%; border-radius: 50%;
            mask-image: radial-gradient(transparent 65%, black 66%); -webkit-mask-image: radial-gradient(transparent 65%, black 66%);
            animation: rotateBorder 4s linear infinite;
        }
        .product-stage::before { background: conic-gradient(transparent, transparent, transparent, var(--gold)); }
        .product-stage::after { background: conic-gradient(transparent, transparent, transparent, var(--neon-blue)); animation-delay: -2s; }
        @keyframes rotateBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hero-img {
            width: 80%; height: auto; position: relative; z-index: 2;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- PRODUCTS GRID --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 100px;
        }

        .liquid-card {
            background: linear-gradient(145deg, var(--glass-bg), rgba(255,255,255,0.01));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 25px; text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .liquid-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-25deg); transition: 0.7s; pointer-events: none;
        }
        .liquid-card:hover::before { left: 150%; }

        .liquid-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.15);
        }

        .prod-img-box { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .prod-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); transition: 0.4s; }
        .liquid-card:hover .prod-img { transform: scale(1.1); }

        .prod-title { font-size: 1.05rem; margin-bottom: 12px; color: #fff; font-weight: 700; min-height: 3rem; display: flex; align-items: center; justify-content: center; }
        .prod-price { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; }
        .prod-price span { font-size: 0.8rem; font-weight: normal; color: #aaa; margin-right: 5px; }

        .btn-add {
            display: block; width: 100%; padding: 12px;
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            border-radius: 15px; font-weight: bold; text-decoration: none; transition: 0.3s;
        }
        .btn-add:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        /* --- SHOWCASE --- */
        .showcase-wrapper {
            position: relative; padding: 4px; border-radius: 25px; margin-bottom: 120px;
            background: linear-gradient(45deg, var(--gold), var(--neon-purple), var(--neon-blue));
            animation: rainbowBorder 3s linear infinite;
        }
        @keyframes rainbowBorder { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .showcase-inner { background: #0a0a0a; border-radius: 22px; overflow: hidden; }
        .showcase-img { width: 100%; display: block; }

        .sticky-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 999;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <header>
        <div class="container">
            <h1 class="glitch-text">درخشش برند شما<br>در قلب شب</h1>
            <p style="font-size: 1.1rem; color: #aaa; max-width: 500px; margin: 0 auto 20px;">
                تجربه‌ای متفاوت از تبلیغات با لوگو پروژکتورهای هوشمند
            </p>
            <div class="product-stage">
                <img src="images/p1.png" alt="پروژکتور اصلی" class="hero-img">
            </div>
            <a href="#products" style="color: var(--gold); text-decoration: none; font-size: 1.2rem;">
                مشاهده کاتالوگ <br> <i class="fas fa-chevron-down animate-bounce mt-2"></i>
            </a>
        </div>
    </header>

    <section id="products" class="container">
        <h2 class="section-title">لیست محصولات ۱۴۰۵</h2>
        
        <div class="products-grid">
            <script>
                const products = [
                    { id: 1, name: "لوگو پروژکتور 1200W فوق قدرتمند", price: "144,000,000" },
                    { id: 2, name: "لوگو پروژکتور 300W مدل اسلایدی", price: "33,900,000" },
                    { id: 3, name: "لوگو پروژکتور 200W مدل اسلایدی", price: "29,900,000" },
                    { id: 4, name: "لوگو پروژکتور 300W دور چرخشی", price: "29,000,000" },
                    { id: 5, name: "لوگو پروژکتور 200W دور چرخشی", price: "24,900,000" },
                    { id: 6, name: "لوگو پروژکتور 100W مدل اسلایدی", price: "19,700,000" },
                    { id: 7, name: "لوگو پروژکتور 100W دور چرخشی", price: "17,500,000" },
                    { id: 8, name: "لوگو پروژکتور 70W دور چرخشی", price: "14,900,000" }
                ];

                document.write(products.map(p => `
                    <div class="liquid-card">
                        <div class="prod-img-box">
                            <img src="images/p${p.id}.png" alt="${p.name}" class="prod-img">
                        </div>
                        <h3 class="prod-title">${p.name}</h3>
                        <div class="prod-price">${p.price} <span>تومان</span></div>
                        <a href="tel:09195703080" class="btn-add">ثبت سفارش</a>
                    </div>
                `).join(''));
            </script>
        </div>
    </section>

    <section class="container">
        <h2 class="section-title">اجرای پروژه‌ها</h2>
        <div class="showcase-wrapper">
            <div class="showcase-inner">
                <img src="image_0.png" alt="نمونه کار" class="showcase-img">
            </div>
        </div>
    </section>
    
    <div style="height: 100px;"></div>

    <div class="sticky-footer">
        <div class="text-right">
            <span style="color: var(--gold); font-size: 0.8rem;">مشاوره رایگان:</span><br>
            <span style="font-weight: 900; letter-spacing: 1px;">۰۹۱۹۵۷۰۳۰۸۰</span>
        </div>
        <a href="tel:09195703080" style="background: var(--gold); color: #000; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: 900; box-shadow: 0 0 15px var(--gold);">
            <i class="fas fa-phone"></i> تماس بگیرید
        </a>
    </div>

    <script>
        // ساخت ذرات معلق (ریزتر و بیشتر)
        function createParticles() {
            const count = 70; // تعداد بیشتر برای زیبایی
            const body = document.body;
            for (let i = 0; i < count; i++) {
                let p = document.createElement('div');
                p.classList.add('particle');
                
                // ذرات ریزتر (بین 0.5 تا 2.5 پیکسل)
                let size = Math.random() * 2 + 0.5;
                p.style.width = size + 'px'; 
                p.style.height = size + 'px';
                
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 8 + 4) + 's'; 
                p.style.animationDelay = (Math.random() * 10) + 's';
                
                let colors = ['#FFD700', '#ffffff', '#00f3ff', 'rgba(212,175,55,0.3)'];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // درخشش ذرات
                p.style.boxShadow = `0 0 ${size*2}px ${p.style.background}`;
                
                body.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
