<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه لوگو پروژکتور | نسخه متالیک و نئون</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050508;
            --copper: #b87333;
            --space-gray: #4a4a4a;
            --neon-blue: #00f3ff;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(0, 243, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Vazirmatn', sans-serif !important;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* پس‌زمینه با تم مسی و اسپیس‌گری */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(184, 115, 51, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(74, 74, 74, 0.2) 0%, transparent 40%),
                        #050508;
            z-index: -2;
        }
        
        /* ذرات ریز مسی و نقره‌ای */
        .particle {
            position: fixed; border-radius: 50%; opacity: 0; pointer-events: none;
            animation: rise linear infinite; z-index: -1;
        }
        @keyframes rise {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-5vh) scale(1); opacity: 0; }
        }

        .container { width: 92%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }

        header {
            min-height: 70vh; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding-top: 80px;
        }

        .glitch-text {
            font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 900; line-height: 1.2;
            background: linear-gradient(to bottom, #fff, var(--copper));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .product-stage {
            position: relative; width: 280px; height: 280px; margin: 30px auto;
            display: flex; justify-content: center; align-items: center;
        }
        .product-stage::before {
            content: ''; position: absolute; width: 110%; height: 110%; border-radius: 50%;
            border: 2px dashed var(--neon-blue); animation: rotateBorder 10s linear infinite;
            opacity: 0.3;
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        .hero-img {
            width: 80%; z-index: 2; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* باکس محصول با استایل شیشه‌ای آبی نئون */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 120px;
        }

        .liquid-card {
            background: rgba(0, 243, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 25px; text-align: center;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .liquid-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
        }

        .prod-img-box { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .prod-img { max-width: 90%; max-height: 100%; transition: 0.4s; }

        .prod-title { font-size: 1.05rem; font-weight: 700; min-height: 3rem; color: #f0f0f0; }
        .prod-price { color: var(--neon-blue); font-size: 1.6rem; font-weight: 900; margin: 10px 0; }

        .btn-order {
            display: block; width: 100%; padding: 12px;
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            border-radius: 15px; font-weight: bold; text-decoration: none; transition: 0.3s;
        }
        .btn-order:hover { background: var(--neon-blue); color: #000; }

        /* فوتر چسبنده برای موبایل و دسکتاپ */
        .sticky-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px);
            border-top: 1px solid var(--space-gray); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 999;
        }

        .footer-right { text-align: right; }
        .footer-right a { color: #fff; text-decoration: none; font-weight: 900; font-size: 1.2rem; }
        
        .btn-wa-footer {
            background: #25D366; color: white; padding: 10px 20px; border-radius: 50px;
            text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px;
        }

        @media (max-width: 480px) {
            .btn-wa-footer span { display: none; }
            .btn-wa-footer { padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <header class="container">
        <h1 class="glitch-text">لوگو پروژکتورهای<br>سری لاکچری</h1>
        <div class="product-stage">
            <img src="images/p1.png" alt="محصول اصلی" class="hero-img">
        </div>
    </header>

    <section id="products" class="container">
        <div class="products-grid">
            <script>
                const data = [
                    { id: 1, name: "لوگو پروژکتور 1200W قدرتمند", price: "144,000,000" },
                    { id: 2, name: "لوگو پروژکتور 300W اسلایدی", price: "33,900,000" },
                    { id: 3, name: "لوگو پروژکتور 200W اسلایدی", price: "29,900,000" },
                    { id: 4, name: "لوگو پروژکتور 300W چرخشی", price: "29,000,000" },
                    { id: 5, name: "لوگو پروژکتور 200W چرخشی", price: "24,900,000" },
                    { id: 6, name: "لوگو پروژکتور 100W اسلایدی", price: "19,700,000" },
                    { id: 7, name: "لوگو پروژکتور 100W چرخشی", price: "17,500,000" },
                    { id: 8, name: "لوگو پروژکتور 70W چرخشی", price: "14,900,000" }
                ];

                document.write(data.map(p => {
                    const msg = encodeURIComponent(`سلام، برای خرید "${p.name}" نیاز به مشاوره دارم.`);
                    return `
                    <div class="liquid-card">
                        <div class="prod-img-box"><img src="images/p${p.id}.png" class="prod-img"></div>
                        <h3 class="prod-title">${p.name}</h3>
                        <div class="prod-price">${p.price} <small style="font-size:0.7rem">تومان</small></div>
                        <a href="https://wa.me/989195703080?text=${msg}" class="btn-order">
                            <i class="fab fa-whatsapp"></i> مشاوره خرید این مدل
                        </a>
                    </div>
                `}).join(''));
            </script>
        </div>
    </section>

    <div class="sticky-footer">
        <a href="https://wa.me/989195703080?text=${encodeURIComponent('سلام، در مورد لوگو پروژکتور مشاوره می‌خواستم.')}" class="btn-wa-footer">
            <i class="fab fa-whatsapp" style="font-size: 1.4rem;"></i>
            <span>مشاوره در واتساپ</span>
        </a>
        <div class="footer-right">
            <span style="font-size: 0.7rem; color: #888;">شماره تماس:</span><br>
            <a href="tel:09195703080">۰۹۱۹۵۷۰۳۰۸۰</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const body = document.body;
            const colors = ['#b87333', '#4a4a4a', '#00f3ff', '#ffffff'];
            for (let i = 0; i < 50; i++) {
                let p = document.createElement('div');
                p.classList.add('particle');
                let size = Math.random() * 2.5 + 0.5;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 8 + 4) + 's';
                p.style.background = colors[Math.floor(Math.random() * 4)];
                p.style.boxShadow = `0 0 5px ${p.style.background}`;
                body.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
